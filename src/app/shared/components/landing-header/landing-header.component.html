<mat-toolbar class="landing-toolbar">
  <div class="left">
    <div class="logo-container" routerLink="/">
      <img src="assets/logo.svg" alt="HR Tech" class="logo-img" />
      <span class="brand-name">HR Tech</span>
    </div>
  </div>

  <div class="center">
    <button class="btn btn-gradient-text" routerLink="/about">About</button>
    <button class="btn btn-gradient-text" routerLink="/product">Product</button>
    <button class="btn btn-gradient-text" routerLink="/contact">Contact</button>
  </div>

  <div class="right auth-buttons">
    <a class="btn btn-secondary btn-gradient-text" routerLink="/auth/login">Sign In</a>
    <a class="btn btn-primary" routerLink="/auth/register">Register Company</a>
  </div>
</mat-toolbar>
