<mat-toolbar color="primary" class="header-toolbar">
  <span class="logo" routerLink="/">HR Tech</span>
  <span class="spacer"></span>

  @if (isAuth()) {
    <a mat-button routerLink="/profile">Profile</a>

    @if (userRole() === 'admin' || userRole() === 'hr') {
      <a mat-button routerLink="/candidates">Candidates</a>
    }

    @if (userRole() === 'admin') {
      <a mat-button routerLink="/admin/settings">
        <mat-icon>settings</mat-icon> Settings
      </a>
    }

    <span class="user-greeting">Hi, {{ userName() }}!</span>
    <button mat-icon-button (click)="logout()">
      <mat-icon>logout</mat-icon>
    </button>

  } @else {
    <a mat-button routerLink="/auth/login">Sign In</a>
    <a mat-button routerLink="/auth/register">Register</a>
  }
</mat-toolbar>
